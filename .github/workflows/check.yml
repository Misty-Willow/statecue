name: Check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run public-safety checks
        run: bash scripts/check.sh

      - name: Setup Node
        if: hashFiles('apps/web/package.json') != ''
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        if: hashFiles('apps/web/package.json') != ''
        run: npm --prefix apps/web ci

      - name: Typecheck web app
        if: hashFiles('apps/web/package.json') != ''
        run: npm --prefix apps/web run typecheck

      - name: Test web app
        if: hashFiles('apps/web/package.json') != ''
        run: npm --prefix apps/web run test

      - name: Build web app
        if: hashFiles('apps/web/package.json') != ''
        run: npm --prefix apps/web run build

      - name: Smoke web build
        if: hashFiles('apps/web/package.json') != ''
        run: bash scripts/check-web-build.sh

      - name: Re-run public-safety checks
        run: bash scripts/check.sh

      - name: Setup Go
        if: hashFiles('apps/api/go.mod') != ''
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.mod

      - name: Test API
        if: hashFiles('apps/api/go.mod') != ''
        working-directory: apps/api
        run: go test ./...

      - name: Build API
        if: hashFiles('apps/api/go.mod') != ''
        working-directory: apps/api
        run: go build -o /tmp/statecue-api ./cmd/statecue-api

      - name: Build API container
        if: hashFiles('apps/api/Dockerfile') != ''
        run: docker build -f apps/api/Dockerfile -t statecue-api:ci .

      - name: Smoke API container
        if: hashFiles('apps/api/Dockerfile') != ''
        run: |
          container_id="$(docker run -d -p 127.0.0.1:18080:9090 -e PORT=9090 statecue-api:ci)"
          trap 'docker rm -f "$container_id" >/dev/null' EXIT
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:18080/healthz >/tmp/statecue-api-health.json; then
              cat /tmp/statecue-api-health.json
              curl -fsS http://127.0.0.1:18080/api/cue >/tmp/statecue-api-cue.json
              grep -F '"direction":"light"' /tmp/statecue-api-cue.json
              curl -fsS http://127.0.0.1:18080/api/scenarios >/tmp/statecue-api-scenarios.json
              grep -F '"direction":"check"' /tmp/statecue-api-scenarios.json
              exit 0
            fi
            sleep 1
          done
          docker logs "$container_id"
          exit 1
